<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق مشاركة الشاشة - Screen Sharing</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .screen-share-container {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 850px;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        #screenVideo {
            width: 100%;
            /* نسبة العرض إلى الارتفاع للحفاظ على شكل الشاشة (Aspect Ratio) */
            aspect-ratio: 16 / 9; 
            border: 2px solid #ccc;
            background-color: #000;
            margin-top: 15px;
            border-radius: 8px;
        }

        #shareButton {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        #shareButton:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="screen-share-container">
        <h2>تطبيق مشاركة الشاشة (Screen Sharing App)</h2>
        <button id="shareButton">مشاركة الشاشة (Start Sharing)</button>
        <br>
        <video id="screenVideo" autoplay playsinline></video>
    </div>

    <script>
        const shareButton = document.getElementById('shareButton');
        const screenVideo = document.getElementById('screenVideo');

        shareButton.addEventListener('click', async () => {
            try {
                // طلب تدفق البيانات (MediaStream) من الشاشة
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: true,
                    audio: false // اجعلها true إذا أردت تضمين صوت النظام (System Audio)
                });

                // عرض التدفق في عنصر الفيديو
                screenVideo.srcObject = stream;

                // إيقاف العرض عند قيام المستخدم بإلغاء المشاركة من المتصفح
                stream.getVideoTracks()[0].onended = () => {
                    screenVideo.srcObject = null;
                };

            } catch (error) {
                console.error("Error sharing screen:", error);
                alert("تعذر مشاركة الشاشة. يرجى التأكد من منح الصلاحيات (Permissions) اللازمة للمتصفح.");
            }
        });
    </script>

</body>
</html>
