<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday Raouia</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        /* إعدادات الخلفية وتوسيط المحتوى */
        body {
            background-color: #1e1e1e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            overflow-y: auto;
        }

        /* Animation جديد بنهاية أكثر حدة (Sharp Drop) */
        @keyframes sharpDrop {
            0% { transform: translateY(-500px); opacity: 0; }
            85% { transform: translateY(0); opacity: 1; }
            92% { transform: translateY(-5px); } /* ارتداد خفيف جداً وسريع */
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes ignite {
            0% { opacity: 0; transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes flicker {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.9; }
            50% { transform: scale(1.1) rotate(-2deg); opacity: 1; }
            75% { transform: scale(0.95) rotate(2deg); opacity: 0.8; }
        }

        /* Animation ظهور النص */
        @keyframes textFadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* تطبيق الـ Animations مع توقيت متدرج (Delays) 
           استخدمنا ease-in بدلاً من cubic-bezier لتقليل النعومة في النهاية
        */
        .layer-1 { animation: sharpDrop 0.4s ease-in forwards; }
        .layer-2 { animation: sharpDrop 0.4s ease-in 0.2s forwards; opacity: 0; }
        .layer-3 { animation: sharpDrop 0.4s ease-in 0.4s forwards; opacity: 0; }
        .candle-group { animation: sharpDrop 0.4s ease-in 0.6s forwards; opacity: 0; }
        
        .flame { 
            animation: 
                ignite 0.4s 1s forwards, 
                flicker 0.15s 1.4s infinite alternate; 
            opacity: 0; 
            transform-origin: 200px 55px; 
        }

        /* تنسيق قسم النصوص */
        .message-box {
            text-align: center;
            max-width: 500px;
            margin-top: -30px;
            padding: 20px;
            /* تم تقليل وقت التأخير ليظهر النص بشكل أسرع بعد الكعكة */
            animation: textFadeIn 0.8s ease-out 1.8s forwards;
            opacity: 0; 
        }

        .message-box h1 {
            font-family: 'Dancing Script', cursive;
            color: #fca311;
            font-size: 3.5rem;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .message-box h2 {
            font-size: 1.2rem;
            color: #e9c46a;
            margin: 10px 0 20px 0;
            letter-spacing: 2px;
        }

        .message-box p {
            font-size: 1rem;
            line-height: 1.6;
            color: #d3d3d3;
        }
    </style>
</head>
<body>

    <svg width="400" height="350" viewBox="0 0 400 400">
        <defs>
            <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
                <feDropShadow dx="0" dy="8" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
            </filter>
        </defs>

        <ellipse cx="200" cy="310" rx="140" ry="20" fill="#2a2a2a" filter="url(#shadow)" />

        <g class="layer-1" filter="url(#shadow)">
            <rect x="80" y="240" width="240" height="60" rx="10" fill="#4a2e1b" />
            <path d="M 80 240 Q 95 270 110 240 Q 125 260 140 240 Q 160 280 180 240 Q 200 265 220 240 Q 240 275 260 240 Q 280 255 300 240 Q 310 260 320 240 Z" fill="#e76f51" />
        </g>
        <g class="layer-2" filter="url(#shadow)">
            <rect x="110" y="180" width="180" height="60" rx="10" fill="#e76f51" />
            <path d="M 110 180 Q 125 210 140 180 Q 160 195 180 180 Q 200 220 220 180 Q 240 200 260 180 Q 275 215 290 180 Z" fill="#ffe8d6" />
        </g>

        <g class="layer-3" filter="url(#shadow)">
            <rect x="140" y="120" width="120" height="60" rx="10" fill="#e9c46a" />
            <path d="M 140 120 Q 155 145 170 120 Q 185 155 200 120 Q 215 140 230 120 Q 245 150 260 120 Z" fill="#ffffff" />
        </g>

        <g class="candle-group">
            <rect x="192" y="70" width="16" height="50" rx="3" fill="#ffffff" />
            <line x1="192" y1="75" x2="208" y2="85" stroke="#c1121f" stroke-width="4" />
            <line x1="192" y1="90" x2="208" y2="100" stroke="#c1121f" stroke-width="4" />
            <line x1="192" y1="105" x2="208" y2="115" stroke="#c1121f" stroke-width="4" />
            <line x1="200" y1="70" x2="200" y2="55" stroke="#333" stroke-width="2" />
        </g>

        <g class="flame">
            <ellipse cx="200" cy="45" rx="8" ry="16" fill="#fca311" filter="url(#shadow)" />
            <ellipse cx="200" cy="50" rx="4" ry="8" fill="#ffffff" />
        </g>
    </svg>

    <div class="message-box">
        <h1>Happy Birthday Raouia</h1>
        <h2>17 March 2004</h2>
        <p>On this beautiful day, one of the most wonderful and inspiring souls was born. The world became a brighter place the moment you arrived. Wishing you a year ahead filled with joy, success, and endless happiness. Keep shining!</p>
    </div>

</body>
</html>
